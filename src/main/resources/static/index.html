<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Todo App</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --border: #2a2a2a;
      --accent: #c8f135;
      --text: #f0f0f0;
      --muted: #555;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 20px;
    }

    .container { width: 100%; max-width: 560px; }

    header { margin-bottom: 40px; }

    .tag {
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 90px;
      line-height: 0.9;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .stats {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .stats b { color: var(--accent); }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 32px;
    }

    input[type="text"] {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      padding: 14px 18px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }

    .add-btn {
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      padding: 14px 22px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .add-btn:hover { background: #d9ff4d; }

    .task-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px 18px;
      border: 1px solid var(--border);
      margin-bottom: 8px;
      background: var(--surface);
      transition: border-color 0.2s;
    }

    .task-item:hover { border-color: #3a3a3a; }
    .task-item.done { opacity: 0.45; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .check {
      width: 20px; height: 20px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .check:hover { border-color: var(--accent); }
    .task-item.done .check { background: var(--accent); border-color: var(--accent); }
    .check-icon { display: none; color: #0d0d0d; font-size: 12px; font-weight: bold; }
    .task-item.done .check-icon { display: block; }

    .task-text { flex: 1; font-size: 14px; }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 18px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .delete-btn:hover { color: #ff5555; }

    .empty {
      text-align: center;
      padding: 60px 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="tag">// powered by spring boot api</div>
    <h1>TASK<span>S.</span></h1>
    <div class="stats">
      <b id="done-count">0</b> done &nbsp;·&nbsp; <b id="left-count">0</b> remaining
    </div>
  </header>

  <div class="input-row">
    <input type="text" id="task-input" placeholder="add a new task..." />
    <button class="add-btn" onclick="addTask()">ADD</button>
  </div>

  <div id="task-list"></div>
</div>

<script>
  const API = 'https://taskmaster-k8g1.onrender.com/tasks';


  // ── Load all tasks from API ──────────────────────────────────
  async function loadTasks() {
    const res = await fetch(API);
    const tasks = await res.json();
    renderTasks(tasks);
  }

  // ── Render tasks to screen ───────────────────────────────────
  function renderTasks(tasks) {
    const list = document.getElementById('task-list');
    const done = tasks.filter(t => t.completed).length;
    document.getElementById('done-count').textContent = done;
    document.getElementById('left-count').textContent = tasks.length - done;

    if (tasks.length === 0) {
      list.innerHTML = '<div class="empty">✦ no tasks yet — add one above</div>';
      return;
    }

    list.innerHTML = tasks.map(t => `
      <div class="task-item ${t.completed ? 'done' : ''}">
        <div class="check" onclick="toggleTask(${t.id}, ${t.completed})">
          <span class="check-icon">✓</span>
        </div>
        <span class="task-text">${t.name}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})">×</button>
      </div>
    `).join('');
  }

  // ── Add a task ───────────────────────────────────────────────
  async function addTask() {
    const input = document.getElementById('task-input');
    const name = input.value.trim();
    if (!name) return;

    await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, completed: false })
    });

    input.value = '';
    loadTasks();
  }

  // ── Toggle complete ──────────────────────────────────────────
  async function toggleTask(id, completed) {
    await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ completed: !completed })
    });
    loadTasks();
  }

  // ── Delete a task ────────────────────────────────────────────
  async function deleteTask(id) {
    await fetch(`${API}/${id}`, { method: 'DELETE' });
    loadTasks();
  }

  // ── Enter key to add task ────────────────────────────────────
  document.getElementById('task-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  // ── Load tasks on page open ──────────────────────────────────
  loadTasks();
</script>
</body>
</html>
